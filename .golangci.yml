version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - dupl
    - errcheck
    - exhaustive
    - gocritic
    - revive
    - unconvert
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
